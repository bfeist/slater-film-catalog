# =============================================================================
# Slater Film Catalog — Docker Compose
#
# Two services:
#   web  — Nginx (port 9310) serves the Vite SPA + proxies /api/* → api
#   api  — Express API (port 9311 on host, 9301 internal) with NVIDIA GPU
#
# Production ports (avoids collision with local dev on 9300/9301):
#   http://localhost:9310  → full app via Nginx
#   http://localhost:9311  → Express API directly (debug/optional)
#
# Usage:
#   npm run deploy            # build + start (detached)
#   docker compose logs -f    # tail logs
#   docker compose down       # stop
# =============================================================================

name: slater-film-catalog

services:
  # ---------------------------------------------------------------------------
  # API — Express server (no frontend serving; Nginx handles the SPA)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: slater-catalog-api:latest
    container_name: slater-catalog-api
    restart: unless-stopped

    # Expose API port to host for direct debugging (Nginx also proxies to it)
    ports:
      - "9311:9301"

    env_file:
      - .env.docker

    # Mount all runtime data as read-only bind mounts so the container never
    # writes to the host (archival safety: matches /o/ read-only policy).
    volumes:
      # SQLite catalog database
      - ./database:/app/database:ro
      # Shotlist PDFs
      - ./static_assets/shotlist_pdfs:/app/static_assets/shotlist_pdfs:ro
      # LLM OCR outputs
      - ./static_assets/llm_ocr:/app/static_assets/llm_ocr:ro
      # Auth credentials (contains passwords — never baked into image)
      - ./auth.config.json:/app/auth.config.json:ro
      # Activity logs (writable — persisted to host)
      - ./.local/dockerLogs:/app/logs
      # NASA video archive — Docker CIFS named volume (see top-level volumes: below).
      # Docker mounts this SMB share at daemon startup so it survives host reboots.
      # Credentials and share details come from NAS_* vars in the project .env file.
      - type: volume
        source: nasa-archive
        target: /archive
        read_only: true
        volume:
          nocopy: true

    environment:
      # These override .env.docker values — container-specific paths
      DB_PATH: /app/database/catalog.db
      SHOTLIST_PDF_DIR: /app/static_assets/shotlist_pdfs
      LLM_OCR_DIR: /app/static_assets/llm_ocr
      AUTH_CONFIG_PATH: /app/auth.config.json
      # Express should NOT serve the frontend — Nginx handles that
      SERVE_FRONTEND: "false"
      # Logging
      LOG_DIR: /app/logs
      LOG_LEVEL: info

    # NVIDIA GPU passthrough — enables hardware-accelerated ffmpeg (NVDEC/NVENC)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - slater-net

  # ---------------------------------------------------------------------------
  # Web — Nginx serves the Vite SPA + reverse-proxies /api to the api service
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    image: slater-catalog-web:latest
    container_name: slater-catalog-web
    restart: unless-stopped

    ports:
      - "9310:80"

    depends_on:
      - api

    networks:
      - slater-net

networks:
  slater-net:
    driver: bridge

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  # NASA video archive — mounted from the SMB/CIFS network share.
  # Docker's local CIFS driver mounts this at daemon startup and reconnects on
  # host reboots, so it works without any Windows drive mapping or WSL2 setup.
  #
  # Required variables (set in project .env — NOT .env.docker):
  #   NAS_HOST   — IP or hostname of the NAS (e.g. 192.168.0.6)
  #   NAS_SHARE  — share name (e.g. NASA Archive)
  #   NAS_USER   — SMB username
  #   NAS_PASS   — SMB password
  #
  # For anonymous/guest shares set NAS_USER=guest and NAS_PASS= (empty).
  nasa-archive:
    driver: local
    driver_opts:
      type: cifs
      o: "addr=${NAS_HOST},username=${NAS_USER},password=${NAS_PASS},vers=3.0,ro,noperm"
      device: "//${NAS_HOST}/${NAS_SHARE}"
