name: A — Build and publish images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/catalog-api

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run test:all

      - name: Compute release version
        id: ver
        run: echo "version=$(echo ${{ github.sha }} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Upload SPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-${{ steps.ver.outputs.version }}
          path: .local/vite/dist
          retention-days: 14

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push catalog API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          build-args: |
            RELEASE_VERSION=${{ steps.ver.outputs.version }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download SPA artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-${{ needs.build.outputs.version }}
          path: spa-dist

      - name: SSH deploy
        env:
          PROD_HOST: ${{ vars.PROD_HOST }}
          PROD_USER: ${{ vars.PROD_USER }}
          PROD_PATH_APPROOT: ${{ vars.PROD_PATH_APPROOT }}
          PROD_PATH_WEBROOT: ${{ vars.PROD_PATH_WEBROOT }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          IMAGE_TAG: ${{ needs.build.outputs.version }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}/catalog-api
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

          # Push SPA build to host
          rsync -avzO --no-perms --delete -e "ssh -i ~/.ssh/id_deploy" \
            spa-dist/ "$PROD_USER@$PROD_HOST:$PROD_PATH_WEBROOT/"

          # Write .env.prod locally so it rsync's cleanly (avoids SSH pipe encoding issues)
          printf '%s\n' "$PROD_ENV_FILE" > /tmp/env.prod
          chmod 600 /tmp/env.prod

          # Push compose file, helper scripts, and .env.prod to app root
          rsync -avzO --no-perms -e "ssh -i ~/.ssh/id_deploy" \
            compose.prod.yml compose_up.sh compose_down.sh \
            "$PROD_USER@$PROD_HOST:$PROD_PATH_APPROOT/"
          rsync -avzO --no-perms -e "ssh -i ~/.ssh/id_deploy" \
            /tmp/env.prod "$PROD_USER@$PROD_HOST:$PROD_PATH_APPROOT/.env.prod"
          ssh -i ~/.ssh/id_deploy "$PROD_USER@$PROD_HOST" \
            "chmod 600 $PROD_PATH_APPROOT/.env.prod && \
             chmod 755 $PROD_PATH_APPROOT/compose_up.sh $PROD_PATH_APPROOT/compose_down.sh && \
             mkdir -p $PROD_PATH_APPROOT/.local/dockerLogs"

          # Pull image, restart compose
          ssh -i ~/.ssh/id_deploy "$PROD_USER@$PROD_HOST" bash -se <<EOF
            set -e
            cd "$PROD_PATH_APPROOT"
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin
            export CATALOG_API_IMAGE="$GHCR_IMAGE:$IMAGE_TAG"
            # Persist the deployed image tag so manual restarts work:
            #   docker compose -f compose.prod.yml --env-file .env.prod --env-file .env.deploy restart api
            echo "CATALOG_API_IMAGE=$GHCR_IMAGE:$IMAGE_TAG" > .env.deploy
            chmod 600 .env.deploy
            docker compose -f compose.prod.yml --env-file .env.prod --env-file .env.deploy pull
            docker compose -f compose.prod.yml --env-file .env.prod --env-file .env.deploy up -d
            sudo systemctl reload nginx || true
            curl -fsS http://127.0.0.1:9311/api/stats | head -c 200
          EOF
